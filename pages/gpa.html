<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>

<header>
    <h1>CampusAI GPA Calculator</h1>
</header>

<div class="calculator">

    <h2>Calculate Your GPA</h2>

    <input type="number" id="grade1" placeholder="Course 1 Grade">

    <input type="number" id="grade2" placeholder="Course 2 Grade">

    <input type="number" id="grade3" placeholder="Course 3 Grade">

    <button onclick="calculateGPA()">Calculate GPA</button>

    <h3 id="result"></h3>

</div>

<script>

function calculateGPA(){

let g1 = Number(document.getElementById("grade1").value);
let g2 = Number(document.getElementById("grade2").value);
let g3 = Number(document.getElementById("grade3").value);

let average = (g1 + g2 + g3) / 3;

let gpa = (average / 100) * 4;

document.getElementById("result").innerHTML =
"Estimated GPA: " + gpa.toFixed(2);

}

</script>

</body>
</html>
